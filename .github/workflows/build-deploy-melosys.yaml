name: Build and deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'Deploy to production'
        required: true
        type: boolean
        default: false

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      #todo: Remove when test coverage is available
      - name: Build with Maven
        run: mvn clean install

      #todo: Add when test coverage is available
#      - name: Cache SonarCloud packages
#        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
#        with:
#          path: ~/.sonar/cache
#          key: ${{ runner.os }}-sonar
#          restore-keys: ${{ runner.os }}-sonar
#
#      - name: Build and analyze
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#        run: mvn -B verify -Pcoverage org.sonarsource.scanner.maven:sonar-maven-plugin:sonar


      - name: Push Docker image to GAR
        if: github.event_name != 'pull_request' && github.ref_name == 'main'
        uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512
        id: docker-build-push
        with:
          team: team-oebs

  deploy-t1:
    name: Deploy t1 instance
    needs: build
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb
        env:
          CLUSTER: dev-fss
          RESOURCE: .nais/nais-t1.yaml
          VAR: image=${{ needs.build.outputs.image }}

  deploy-q1:
    name: Deploy q1 instance
    needs: [build, deploy-t1]
    if: github.event_name != 'pull_request' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb
        env:
          CLUSTER: dev-fss
          RESOURCE: .nais/nais-q1.yaml
          VAR: image=${{ needs.build.outputs.image }}

  deploy-prod:
    name: Deploy to prod
    needs: [build, deploy-t1, deploy-q1]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_prod == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: prod
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: nais/deploy/actions/deploy@2d18f050f07b6a007864c6a57070ed915d571beb
        env:
          CLUSTER: prod-fss
          RESOURCE: .nais/nais-p.yaml
          VAR: image=${{ needs.build.outputs.image }}
