apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-melosys-api
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 3
    max: 4
    cpuThresholdPercentage: 50

  liveness:
    path: /actuator/health/liveness
    initialDelay: 60
    timeout: 10
  readiness:
    path: /actuator/health/readiness
    initialDelay: 60
    timeout: 10

  resources:
    requests:
      cpu: 70m
      memory: 600Mi
    limits:
      memory: 800Mi
  kafka:
    pool: nav-prod
  azure:
    application:
      enabled: true
  accessPolicy:
    inbound:
      rules:
         - application: oebs-melosys-api
           namespace: team-oebs
           cluster: prod-fss
  prometheus:
    enabled: true
    path: /actuator/prometheus

  env:
    - name: KAFKA_SSL_TRUSTSTORE
      value: PKCS12
    - name: KAFKA_PRODUCER_CLIENT_ID
      value: oebs-faktura-status-producer
    - name: KAFKA_TOPIC_FAKTURA_STATUS
      value: team-oebs.faktura-status.v1
    - name: KAFKA_TOPIC_TEST_FAKTURA
      value: teammelosys.faktura-bestilt.v1

  envFrom:
    - secret: oebs-melosys-api

  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
