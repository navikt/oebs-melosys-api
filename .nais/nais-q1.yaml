apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-melosys-api-q1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: repo.adeo.no:5443/oebs_q2/oebs-melosys-api-u1:1.1.10
  port: 8080
  replicas:
    min: 2
    max: 4
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    requests:
      cpu: 400m
      memory: 1024Mi
    limits:
      cpu: 4000m
      memory: 2048Mi
  azure:
    application:
      enabled: true
  accessPolicy:
    inbound:
      rules:
         - application: oebs-melosys-api-q1
           namespace: team-oebs
           cluster: dev-fss
  kafka:
    pool: nav-dev
  prometheus:
    enabled: true
    path: /actuator/prometheus
  vault:
    enabled: true
    paths:
      - kvPath: "kv/preprod/fss/oebs-melosys-api-q1/team-oebs/apps-user"
        mountPath: "/secrets/oebs-q1/apps-user"
      - kvPath: "kv/preprod/fss/oebs-melosys-api-q1/team-oebs/app-name"
        mountPath: "/secrets/oebs-q1/app-name"
      - kvPath: "kv/preprod/fss/oebs-melosys-api-q1/team-oebs/jdbc-url"
        mountPath: "/secrets/oebs-q1/jdbc-url"
  ingresses:
     - "https://oebs-melosys-api-q1.dev.intern.nav.no"
