apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: faktura-processor-oebs-q1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50

  liveness:
    path: /actuator/health/liveness
    initialDelay: 60
    timeout: 10
  readiness:
    path: /actuator/health/readiness
    initialDelay: 60
    timeout: 10
  resources:
    requests:
      cpu: 70m
      memory: 600Mi
    limits:
      memory: 800Mi
  kafka:
    pool: nav-dev
  azure:
    application:
      enabled: true
  accessPolicy:
    inbound:
      rules:
         - application: faktura-processor-oebs-q1
           namespace: team-oebs
           cluster: dev-gcp
  prometheus:
    enabled: true
    path: /actuator/prometheus

  env:
    - name: KAFKA_SSL_TRUSTSTORE
      value: JKS
    - name: KAFKA_PRODUCER_CLIENT_ID
      value: oebs-faktura-status-producer-q1
    - name: KAFKA_TOPIC_FAKTURA_STATUS
      value: team-oebs.faktura-status.v1-q1
    - name: KAFKA_TOPIC_TEST_FAKTURA
      value: teammelosys.faktura-bestilt.v1-q2

  envFrom:
    - secret: faktura-processor-oebs-q1

  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
