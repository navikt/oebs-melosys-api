apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: oebs-melosys-api-q1
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  image: {{ image }}
  port: 8080
  replicas:
    min: 1
    max: 1
    cpuThresholdPercentage: 50
  liveness:
    path: /internal/isalive
    initialDelay: 60
    timeout: 10
  readiness:
    path: /internal/isready
    initialDelay: 60
    timeout: 10
  resources:
    requests:
      cpu: 200m
      memory: 600Mi
    limits:
      memory: 1024Mi
  kafka:
    pool: nav-dev
  azure:
    application:
      enabled: true
  accessPolicy:
    inbound:
      rules:
         - application: oebs-melosys-api-q1
           namespace: team-oebs
           cluster: dev-fss
  prometheus:
    enabled: true
    path: /actuator/prometheus
  vault:
    enabled: true
    paths:
      - kvPath: "kv/preprod/fss/oebs-melosys-api-t1/team-oebs"
        mountPath: "/var/run/secrets/nais.io/vault"

  env:
    - name: SPRING_PROFILES_ACTIVE
      value: dev
  ingresses:
     - "https://oebs-melosys-api-q1.intern.dev.nav.no"
