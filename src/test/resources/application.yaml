server:
  port: 8080

spring:
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    username: username
    password: password
    url: jdbc:oracle:thin:@localhost:1521:testdb
  flyway:
    locations: classpath:/db/migration,classpath:/db/oracle
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        temp:
        use__jdbc_metadata_defaults: false
        dialect: org.hibernate.dialect.OracleDialect
    show-sql: false
    open-in-view: false
  jackson:
    parser:
      allow-numeric-leading-zeros: true
  kafka:
    bootstrap-servers: test-kafka.nav.no:9092
    properties:
      security.protocol: plaintext
    consumer:
      group-id: oebs-melosys-api
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      max-poll-records: 1

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 5
      client-id: client-id-test

app:
  kafka:
    retry-max-attempts: '5'
    retry-backoff-period-ms: '30000'
    retry-interval-max-length: '600000'
    topics:
      faktura-status: faktura-status-topic
      test-faktura: test-faktura-topic
