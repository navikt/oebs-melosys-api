# logging.level.org.springframework: INFO
# logging.level.no.nav: DEBUG

server:
  port: 8080

spring:
  profiles:
     active: local # nais # local
  application:
    name: oebs-melosys-api

  kafka:
    producer:
      client.id: melosys-api
      properties:
        max.block.ms: 5000
        request.timeout.ms: 30000
      retries: 2147483647
      bootstrap-servers: "http://d26apbl007.test.local:9092"
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      topic: faktura-bestilt.v1-q2
    consumer:
      bootstrap-servers: "http://d26apbl007.test.local:9092"
      group-id: group_id
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      topic: faktura-bestilt.v1-q1

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
  flyway:
    locations: classpath:/db/migration,classpath:/db/oracle
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.Oracle12cDialect
    show-sql: false
    open-in-view: false
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

# Quartz
using:
  spring:
    schedulerFactory: true

springdoc:
  packagesToScan: no.nav.oebs.melosys
  override-with-generic-response: false
  remove-broken-reference-definitions: false
  swagger-ui:
    disable-swagger-default-url: true
    tags-sorter: alpha