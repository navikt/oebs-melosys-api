#logging.level.org.springframework: INFO
#logging.level.no.nav: DEBUG

server:
  port: 8080

spring:
  profiles:
     active: u1 #local #nais
  application:
    name: oebs-melosys-api-u1

  kafka:
    consumer:
      group-id: oebs-melosys-api-u1
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer #org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      topic: teammelosys.faktura-bestilt.v1-q2
      enable-auto-commit: false
      max-poll-records: 1

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer #org.springframework.kafka.support.serializer.StringSerializer
      acks: all
      topic: team-oebs.faktura-status.v1-u1
      retries: 5
      client-id: oebs-faktura-status-producer-u1

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
  flyway:
    locations: classpath:/db/migration,classpath:/db/oracle
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    show-sql: true
    open-in-view: false
  jackson:
    parser:
      allow-numeric-leading-zeros: true
  quartz:
    job-store-type: jdbc

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

# Quartz
using:
  spring:
    schedulerFactory: true


springdoc:
  packagesToScan: no.nav.oebs.melosys
  override-with-generic-response: false
  remove-broken-reference-definitions: false
  swagger-ui:
    disable-swagger-default-url: true
    tags-sorter: alpha

app:
  kafka:
    retry-max-attempts: '5'
    authorization-exception-retry-interval-secs: '30'
    retry-backoff-period-ms: '30000'
    retry-interval-max-length: '600000'

logging:
  level:
    org:
      springframework: info