server:
  port: 8080

spring:
  profiles:
     active: q1 #u1 #local #nais
  application:
    name: oebs-melosys-api-u1

  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
  flyway:
    locations: classpath:/db/migration,classpath:/db/oracle
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
    show-sql: false
    open-in-view: false
  jackson:
    parser:
      allow-numeric-leading-zeros: true
  quartz:
    job-store-type: jdbc

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics

# Quartz
using:
  spring:
    schedulerFactory: true


springdoc:
  packagesToScan: no.nav.oebs.melosys
  override-with-generic-response: false
  remove-broken-reference-definitions: false
  swagger-ui:
    disable-swagger-default-url: true
    tags-sorter: alpha

app:
  kafka:
    retry-max-attempts: '5'
    authorization-exception-retry-interval-secs: '30'
    retry-backoff-period-ms: '30000'
    retry-interval-max-length: '600000'

logging:
  level:
    org:
      springframework: info